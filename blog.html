    </section>

    <div class="blog-grid" id="blog-grid" aria-live="polite"></div>
  </div>
</main>

<script src="js/site-config.js"></script>
<script src="js/tracking.js"></script>

<script src="js/search.js"></script>
<script src="js/blog-loader.js"></script>
<script>
  window.addEventListener("layout:ready", () => ProductLoader.initHeader());

  document.addEventListener("DOMContentLoaded", async () => {
    const grid = document.getElementById("blog-grid");
    grid.innerHTML = '<p class="blog-empty">Loading posts…</p>';
    const posts = await BlogLoader.loadPublishedPosts();
    BlogLoader.renderGrid(grid, posts, "No posts yet — check back soon.");
  });
</script>
