<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/images/icons/favicon-32.png">
<link rel="apple-touch-icon" href="/images/icons/apple-touch-icon.png">
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#1F3A5F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="AzubaTrends" id="apple-app-title-meta">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">Categories — AzubaTrends</title>
<meta id="page-description" name="description" content="Browse AzubaTrends's home goods by category — decor, lighting, kitchen, textiles, and storage.">
<link id="page-canonical" rel="canonical" href="https://azuba-trends.vercel.app/category">

<!-- OPEN GRAPH (Facebook, WhatsApp) -->
<meta property="og:type" content="website">
<meta id="og-url" property="og:url" content="https://azuba-trends.vercel.app/category">
<meta id="og-title" property="og:title" content="Categories — AzubaTrends">
<meta id="og-description" property="og:description" content="Browse AzubaTrends's home goods by category — decor, lighting, kitchen, textiles, and storage.">
<meta property="og:image" content="https://azuba-trends.vercel.app/images/icons/icon-512.png">
<meta property="og:site_name" content="AzubaTrends">

<!-- TWITTER -->
<meta name="twitter:card" content="summary_large_image">
<meta id="twitter-title" name="twitter:title" content="Categories — AzubaTrends">
<meta id="twitter-description" name="twitter:description" content="Browse AzubaTrends's home goods by category — decor, lighting, kitchen, textiles, and storage.">
<meta name="twitter:image" content="https://azuba-trends.vercel.app/images/icons/icon-512.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/components.css">
</head>
<body>

<div id="header-mount"></div>

<main>
  <div class="container">
    <section class="page-header">
      <div class="breadcrumb"><a href="/">Home</a> / Categories</div>
      <h1 id="category-title">All Categories</h1>
      <p id="category-subtitle">Browse everything we carry.</p>
    </section>

    <div class="chip-row" id="category-chips" aria-label="Filter by category"></div>

    <div class="product-grid" id="product-grid" aria-live="polite"></div>
  </div>
</main>

<div id="footer-mount"></div>

<script src="js/site-config.js"></script>
<script src="js/tracking.js"></script>
<script src="js/security.js"></script>
<script src="js/layout.js"></script>
<script src="js/a2hs.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/cart-button-ui.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fuse.js@7/dist/fuse.min.js"></script>
<script src="js/product-loader.js"></script>
<script src="js/search.js"></script>
<script>
  window.addEventListener("layout:ready", () => ProductLoader.initHeader());

  document.addEventListener("DOMContentLoaded", async () => {

    const grid = document.getElementById("product-grid");
    ProductLoader.renderSkeletonGrid(grid, 8);

    const products = await ProductLoader.loadAllProducts();
    const chips = document.getElementById("category-chips");
    const titleEl = document.getElementById("category-title");
    const subtitleEl = document.getElementById("category-subtitle");

    // Clean URL is /category/some-slug (see vercel.json rewrite -> this
    // file), same technique product.html and blog-post.html use. Old
    // ?category= links (e.g. from the sitemap cache or bookmarks) still
    // work as a fallback so nothing breaks.
    const pathParts = window.location.pathname.split("/").filter(Boolean);
    const pathSlug = pathParts[0] === "category" ? pathParts[1] : null;
    const params = new URLSearchParams(window.location.search);
    let activeCategory = pathSlug || params.get("category") || "All";
    // Guard against a stale/typo'd category value in the URL.
    const knownCategories = ["All", ...ProductLoader.getCategories(products)];
    if (!knownCategories.includes(activeCategory)) activeCategory = "All";

    function applyFilter() {
      const filtered = activeCategory === "All"
        ? products
        : products.filter((p) => p.category === activeCategory);
      Security.setTextSafely(titleEl, activeCategory === "All" ? "All Categories" : activeCategory);
      Security.setTextSafely(
        subtitleEl,
        activeCategory === "All"
          ? "Browse everything we carry."
          : `${filtered.length} product${filtered.length === 1 ? "" : "s"} in ${activeCategory}.`
      );
      ProductLoader.renderGrid(grid, filtered, "No products in this category yet — try another one.");

      // SEO: each category gets its own canonical URL, title and meta
      // description so Google can index it as a distinct page instead of
      // every ?category= value collapsing onto one canonical.
      const pageTitle = activeCategory === "All" ? "Categories — AzubaTrends" : `${activeCategory} — AzubaTrends`;
      const pageDesc = activeCategory === "All"
        ? "Browse AzubaTrends's home goods by category — decor, lighting, kitchen, textiles, and storage."
        : `Shop ${activeCategory} at AzubaTrends — browse our full ${activeCategory.toLowerCase()} collection.`;
      const canonicalUrl = activeCategory === "All"
        ? "https://azuba-trends.vercel.app/category"
        : `https://azuba-trends.vercel.app/category/${encodeURIComponent(activeCategory)}`;

      document.getElementById("page-title").textContent = pageTitle;
      document.getElementById("page-description").setAttribute("content", pageDesc);
      document.getElementById("page-canonical").setAttribute("href", canonicalUrl);
      document.getElementById("og-title").setAttribute("content", pageTitle);
      document.getElementById("og-description").setAttribute("content", pageDesc);
      document.getElementById("og-url").setAttribute("content", canonicalUrl);
      document.getElementById("twitter-title").setAttribute("content", pageTitle);
      document.getElementById("twitter-description").setAttribute("content", pageDesc);
    }

    function selectCategory(cat) {
      activeCategory = cat;
      const path = cat === "All" ? "/category" : `/category/${encodeURIComponent(cat)}`;
      history.replaceState(null, "", path);
      renderChips();
      applyFilter();
    }

    function renderChips() {
      ProductLoader.renderCategoryChips(chips, products, selectCategory, activeCategory);
    }

    renderChips();
    applyFilter();
  });
</script>
</body>
</html>
