<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Categories — AzubaTrends</title>
<meta name="description" content="Browse AzubaTrends's home goods by category — decor, lighting, kitchen, textiles, and storage.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/components.css">
</head>
<body>

<div id="header-mount"></div>

<main>
  <div class="container">
    <section class="page-header">
      <div class="breadcrumb"><a href="index.html">Home</a> / Categories</div>
      <h1 id="category-title">All Categories</h1>
      <p id="category-subtitle">Browse everything we carry.</p>
    </section>

    <div class="chip-row" id="category-chips" aria-label="Filter by category"></div>

    <div class="product-grid" id="product-grid" aria-live="polite"></div>
  </div>
</main>

<div id="footer-mount"></div>

<script src="js/site-config.js"></script>
<script src="js/tracking.js"></script>
<script src="js/security.js"></script>
<script src="js/layout.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/cart-button-ui.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fuse.js@7/dist/fuse.min.js"></script>
<script src="js/product-loader.js"></script>
<script src="js/search.js"></script>
<script>
  window.addEventListener("layout:ready", () => ProductLoader.initHeader());

  document.addEventListener("DOMContentLoaded", async () => {

    const grid = document.getElementById("product-grid");
    ProductLoader.renderSkeletonGrid(grid, 8);

    const products = await ProductLoader.loadAllProducts();
    const chips = document.getElementById("category-chips");
    const titleEl = document.getElementById("category-title");
    const subtitleEl = document.getElementById("category-subtitle");

    const params = new URLSearchParams(window.location.search);
    let activeCategory = params.get("category") || "All";
    // Guard against a stale/typo'd ?category= value in the URL.
    const knownCategories = ["All", ...ProductLoader.getCategories(products)];
    if (!knownCategories.includes(activeCategory)) activeCategory = "All";

    function applyFilter() {
      const filtered = activeCategory === "All"
        ? products
        : products.filter((p) => p.category === activeCategory);
      Security.setTextSafely(titleEl, activeCategory === "All" ? "All Categories" : activeCategory);
      Security.setTextSafely(
        subtitleEl,
        activeCategory === "All"
          ? "Browse everything we carry."
          : `${filtered.length} product${filtered.length === 1 ? "" : "s"} in ${activeCategory}.`
      );
      ProductLoader.renderGrid(grid, filtered, "No products in this category yet — try another one.");
    }

    function selectCategory(cat) {
      activeCategory = cat;
      const url = new URL(window.location.href);
      if (cat === "All") url.searchParams.delete("category");
      else url.searchParams.set("category", cat);
      history.replaceState(null, "", url);
      renderChips();
      applyFilter();
    }

    function renderChips() {
      ProductLoader.renderCategoryChips(chips, products, selectCategory, activeCategory);
    }

    renderChips();
    applyFilter();
  });
</script>
</body>
</html>
