<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">Product — AzubaTrends</title>
<meta id="page-description" name="description" content="Shop handmade home goods at AzubaTrends.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/components.css">
</head>
<body>

<div id="header-mount"></div>

<main>
  <div class="container">

    <div id="product-not-found" class="empty-state" hidden>
      <h2>We couldn't find that product</h2>
      <p>It may have been removed, or the link might be incorrect.</p>
      <p style="margin-top:16px;"><a class="btn btn-primary" href="index.html">Back to shop</a></p>
    </div>

    <div id="product-root" hidden>
      <div class="breadcrumb">
        <a href="index.html">Home</a> / <a href="category.html" id="breadcrumb-category">Category</a>
      </div>

      <div class="product-detail">
        <!-- Gallery -->
        <div>
          <div class="gallery__main" id="gallery-main">
            <img id="gallery-main-img" src="" alt="">
          </div>
          <div class="gallery__thumbs" id="gallery-thumbs"></div>
        </div>

        <!-- Info -->
        <div>
          <div class="product-info__brand" id="product-brand" hidden></div>
          <div class="product-info__category" id="product-category"></div>
          <h1 class="product-info__title" id="product-title"></h1>

          <div class="product-info__price">
            <span class="price-current" id="product-price-current"></span>
            <span class="price-mrp" id="product-price-mrp" hidden></span>
            <span class="discount-pill" id="product-discount" hidden></span>
          </div>

          <div class="delivery-partner-note" id="delivery-partner-note" hidden>
            This product comes from
            <img id="delivery-partner-logo" alt="" hidden>
            <strong id="delivery-partner-name"></strong>
          </div>

          <p class="product-info__short" id="product-short-desc"></p>

          <div id="product-stock-pill"></div>

          <div class="product-info__actions">
            <div>
              <label for="qty-input" class="visually-hidden">Quantity</label>
              <input type="number" id="qty-input" data-qty-input min="1" step="1" value="1"
                     style="width:70px; padding:10px; border:1px solid var(--color-border); border-radius:var(--radius-sm); text-align:center;">
            </div>
            <button type="button" id="add-to-cart-btn" class="btn btn-primary">Add to Cart</button>
            <button type="button" id="buy-now-btn" class="btn btn-outline">Buy Now</button>
          </div>

          <div class="product-info__meta">
            <span id="product-sku"></span>
            <span id="product-stock-count"></span>
          </div>

          <div class="product-tabs">
            <h3>Description</h3>
            <p class="product-tabs__desc" id="product-description"></p>
          </div>
        </div>
      </div>

      <!-- Reviews -->
      <section aria-labelledby="reviews-heading" style="max-width:760px;">
        <h2 id="reviews-heading">Ratings &amp; Reviews</h2>

        <div class="reviews-summary">
          <span class="reviews-summary__score" id="review-avg-score">—</span>
          <div>
            <span id="review-avg-stars"></span>
            <p class="reviews-summary__note" id="review-count-note">No reviews yet</p>
          </div>
        </div>

        <form class="review-form" id="review-form" novalidate>
          <!-- Honeypot field — real users never see or fill this in -->
          <div style="position:absolute; left:-9999px; width:1px; height:1px; overflow:hidden;" aria-hidden="true">
            <label for="review-website">Website</label>
            <input type="text" id="review-website" name="website" tabindex="-1" autocomplete="off">
          </div>
          <div class="form-field">
            <label>Your rating</label>
            <div class="star-input" id="review-star-input"></div>
          </div>
          <div class="form-field">
            <label for="review-comment">Your review</label>
            <textarea id="review-comment" placeholder="What did you think?" required></textarea>
          </div>
          <div class="form-field">
            <label for="review-image">Add a photo (optional)</label>
            <input type="file" id="review-image" accept="image/jpeg,image/png,image/webp">
            <span class="form-hint">JPG, PNG, or WEBP · up to 2MB</span>
          </div>
          <p class="form-error" id="review-error"></p>
          <p class="review-toast" id="review-toast">Thanks — your review is now live for everyone to see.</p>
          <button type="submit" class="btn btn-accent" style="align-self:flex-start;">Submit review</button>
        </form>

        <div class="review-list" id="review-list"></div>
      </section>
    </div>

  </div>
</main>

<div class="lightbox" id="lightbox" hidden>
  <button class="lightbox__close" id="lightbox-close" aria-label="Close image">&times;</button>
  <img id="lightbox-img" src="" alt="">
</div>

<div id="footer-mount"></div>

<script src="js/site-config.js"></script>
<script src="js/security.js"></script>
<script src="js/layout.js"></script>
    <script src="js/cart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fuse.js@7/dist/fuse.min.js"></script>
<script src="js/product-loader.js"></script>
<script src="js/search.js"></script>
<script src="js/reviews.js"></script>
<script>
  window.addEventListener("layout:ready", () => ProductLoader.initHeader());

  document.addEventListener("DOMContentLoaded", async () => {

    const params = new URLSearchParams(window.location.search);
    const productId = params.get("id");
    const product = productId ? await ProductLoader.getProductById(productId) : null;

    if (!product) {
      document.getElementById("product-not-found").hidden = false;
      return;
    }
    document.getElementById("product-root").hidden = false;

    // ---- SEO meta tags ---------------------------------------------
    // This is a client-rendered page: there is no server templating,
    // so document.title/meta description only exist once this script
    // runs. That means crawlers/bots that DON'T execute JavaScript —
    // e.g. WhatsApp or Facebook's link-unfurling bots — will see the
    // generic fallback title/description from the static <head>
    // above, not this product's real title/description. Google's own
    // crawler does execute JS and will see this. Fixing this fully
    // would need server-side rendering or a prerendering step, which
    // is out of scope for a plain static multi-page site like this one.
    document.title = `${product.title} — ${SITE_CONFIG.siteName}`;
    document.getElementById("page-description").setAttribute("content", product.shortDescription || product.title);

    // ---- Breadcrumb ---------------------------------------------
    const catLink = document.getElementById("breadcrumb-category");
    Security.setTextSafely(catLink, product.category || "Category");
    catLink.href = `category.html?category=${encodeURIComponent(product.category || "")}`;

    // ---- Gallery ---------------------------------------------
    const images = (product.images && product.images.length > 0) ? product.images : [""];
    const mainImg = document.getElementById("gallery-main-img");
    const thumbsWrap = document.getElementById("gallery-thumbs");
    mainImg.src = images[0];
    mainImg.alt = product.title;

    if (images.length > 1) {
      images.forEach((src, i) => {
        const thumb = document.createElement("button");
        thumb.type = "button";
        thumb.className = "gallery__thumb" + (i === 0 ? " is-active" : "");
        const img = document.createElement("img");
        img.src = src;
        img.alt = `${product.title} — view ${i + 1}`;
        img.loading = "lazy";
        thumb.appendChild(img);
        thumb.addEventListener("click", () => {
          mainImg.src = src;
          thumbsWrap.querySelectorAll(".gallery__thumb").forEach((t) => t.classList.remove("is-active"));
          thumb.classList.add("is-active");
        });
        thumbsWrap.appendChild(thumb);
      });
    }

    const lightbox = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightbox-img");
    document.getElementById("gallery-main").addEventListener("click", () => {
      lightboxImg.src = mainImg.src;
      lightboxImg.alt = mainImg.alt;
      lightbox.hidden = false;
    });
    function closeLightbox() { lightbox.hidden = true; }
    document.getElementById("lightbox-close").addEventListener("click", closeLightbox);
    lightbox.addEventListener("click", (e) => { if (e.target === lightbox) closeLightbox(); });
    document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeLightbox(); });

    // ---- Info ---------------------------------------------
    const brandEl = document.getElementById("product-brand");
    if (product.brand) {
      Security.setTextSafely(brandEl, product.brand);
      brandEl.hidden = false;
    } else {
      brandEl.hidden = true;
    }

    Security.setTextSafely(document.getElementById("product-category"), product.category || "");
    Security.setTextSafely(document.getElementById("product-title"), product.title || "");
    Security.setTextSafely(document.getElementById("product-short-desc"), product.shortDescription || "");
    Security.setTextSafely(document.getElementById("product-description"), product.description || "");
    Security.setTextSafely(document.getElementById("product-sku"), `SKU: ${product.sku || "—"}`);

    document.getElementById("product-price-current").textContent = ProductLoader.formatPrice(product.sellingPrice);
    const discount = ProductLoader.calcDiscount(product);
    if (discount > 0) {
      const mrpEl = document.getElementById("product-price-mrp");
      mrpEl.textContent = ProductLoader.formatPrice(product.mrp);
      mrpEl.hidden = false;
      const discEl = document.getElementById("product-discount");
      discEl.textContent = `${discount}% off`;
      discEl.hidden = false;
    }

    // Delivery partner note — only shown when the admin actually set a
    // name or logo for this product; otherwise the whole row stays hidden
    // rather than showing an empty/half-filled line.
    const deliveryNote = document.getElementById("delivery-partner-note");
    const deliveryLogo = document.getElementById("delivery-partner-logo");
    const deliveryNameEl = document.getElementById("delivery-partner-name");
    if (product.deliveryPartnerName || product.deliveryPartnerImage) {
      Security.setTextSafely(deliveryNameEl, product.deliveryPartnerName || "");
      if (product.deliveryPartnerImage) {
        deliveryLogo.src = product.deliveryPartnerImage;
        deliveryLogo.hidden = false;
      } else {
        deliveryLogo.hidden = true;
      }
      deliveryNote.hidden = false;
    } else {
      deliveryNote.hidden = true;
    }

    const qtyInput = document.getElementById("qty-input");
    const addBtn = document.getElementById("add-to-cart-btn");
    const buyNowBtn = document.getElementById("buy-now-btn");
    const stockPill = document.getElementById("product-stock-pill");
    const stockCount = document.getElementById("product-stock-count");

    if (product.stock === 0) {
      stockPill.innerHTML = '<span class="oos-pill">Out of Stock</span>';
      Security.setTextSafely(stockCount, "");
      addBtn.textContent = "Out of Stock";
      addBtn.disabled = true;
      addBtn.setAttribute("aria-disabled", "true");
      buyNowBtn.disabled = true;
      buyNowBtn.setAttribute("aria-disabled", "true");
      qtyInput.disabled = true;
    } else {
      Security.setTextSafely(stockCount, product.stock <= 5 ? `Only ${product.stock} left` : "In stock");
      qtyInput.max = String(product.stock);
      // Cart hooks — see product-loader.js file header for the full
      // contract. cart.js queries [data-add-to-cart] and [data-buy-now].
      addBtn.setAttribute("data-add-to-cart", "");
      addBtn.setAttribute("data-product-id", product.id);
      addBtn.setAttribute("data-product-title", product.title);
      addBtn.setAttribute("data-product-price", String(product.sellingPrice));
      addBtn.setAttribute("data-product-image", images[0]);

      buyNowBtn.setAttribute("data-buy-now", "");
      buyNowBtn.setAttribute("data-product-id", product.id);
      buyNowBtn.setAttribute("data-product-title", product.title);
      buyNowBtn.setAttribute("data-product-price", String(product.sellingPrice));
      buyNowBtn.setAttribute("data-product-image", images[0]);
    }

    // ---- Reviews ---------------------------------------------
    Reviews.init(product.id, {
      productTitle: product.title,
      form: document.getElementById("review-form"),
      starInput: document.getElementById("review-star-input"),
      commentInput: document.getElementById("review-comment"),
      imageInput: document.getElementById("review-image"),
      imageError: document.getElementById("review-error"),
      summaryScore: document.getElementById("review-avg-score"),
      summaryStars: document.getElementById("review-avg-stars"),
      summaryCount: document.getElementById("review-count-note"),
      list: document.getElementById("review-list"),
      toast: document.getElementById("review-toast")
    });
  });
</script>
</body>
</html>
