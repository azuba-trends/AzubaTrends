<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout - AzubaTrends</title>
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/components.css">
<style>
  .checkout-main { max-width: 1040px; margin: 0 auto; padding: 32px 20px 80px; }
  .checkout-grid { display: grid; grid-template-columns: 1fr 320px; gap: 24px; align-items: start; }
  .checkout-card { background: white; border: 1px solid var(--color-border); border-radius: 8px; padding: 24px; margin-bottom: 20px; }
  .form-field { margin-bottom: 16px; }
  .form-field label { display: block; font-weight: 500; font-size: 0.9rem; margin-bottom: 6px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  input[type="text"], input[type="tel"], input[type="email"], textarea, select { width: 100%; padding: 10px 12px; border: 1px solid var(--color-border); border-radius: 8px; font-family: inherit; }
  .field-error { color: red; font-size: 0.8rem; display: block; margin-top: 4px; }
  .summary-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 0.95rem; }
  .summary-row--total { border-top: 1px solid var(--color-border); margin-top: 8px; padding-top: 12px; font-weight: bold; font-size: 1.2rem; }
  .payment-option { display: flex; align-items: center; gap: 10px; border: 1px solid var(--color-border); border-radius: 8px; padding: 14px; cursor: pointer; margin-bottom: 10px; }
  @media (max-width: 760px) { .checkout-grid { grid-template-columns: 1fr; } .form-row { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div id="header-mount"></div>

<main class="checkout-main">
  <h1>Checkout</h1>

  <div id="empty-cart-message" style="display: none; text-align:center; margin-top:50px;">
    <h2>Your cart is empty.</h2>
    <p><a href="index.html" class="btn btn-primary" style="margin-top:20px;">Continue shopping</a></p>
  </div>

  <div id="checkout-content" style="display: none;">
    <div class="checkout-grid">

      <!-- Left Column -->
      <div>
        <!-- Address Section -->
        <section id="delivery-section" class="checkout-card">
          <h2>Delivery Details</h2>
          <form id="delivery-form" novalidate>
            
            <div class="form-field">
              <label>Full name</label>
              <input type="text" id="field-name" required>
            </div>
            
            <div class="form-field">
              <label>Phone number</label>
              <input type="tel" id="field-phone" placeholder="10-digit mobile number" required>
            </div>

            <div class="form-field">
              <label>Email (optional)</label>
              <input type="email" id="field-email" placeholder="you@example.com">
            </div>

            <div class="form-field">
              <label>Full Address</label>
              <textarea id="field-address" rows="3" required></textarea>
            </div>

            <div class="form-row">
              <div class="form-field">
                <label>State</label>
                <select id="field-state" style="background:#eee;" disabled>
                  <option value="West Bengal">West Bengal</option>
                </select>
              </div>
              <div class="form-field">
                <label>City / District</label>
                <select id="field-city" required>
                  <option value="">Select City</option>
                </select>
              </div>
              <div class="form-field">
                <label>Pincode</label>
                <input type="text" id="field-pincode" placeholder="e.g. 700001" required>
                <span class="field-error" id="error-pincode"></span>
              </div>
            </div>

            <button type="submit" class="btn btn-primary" style="margin-top: 15px;">Continue to Payment</button>
          </form>
        </section>

        <!-- Payment Section -->
        <section id="payment-section" class="checkout-card" style="display: none;">
          <h2>Payment Method</h2>
          <p id="payment-order-id-note" style="color: #666; font-size: 0.9rem; margin-bottom: 15px;"></p>

          <label class="payment-option">
            <input type="radio" name="paymentMethod" value="COD" required>
            <span>Cash on Delivery <small>(COD charge applies)</small></span>
          </label>
          <label class="payment-option">
            <input type="radio" name="paymentMethod" value="UPI">
            <span>Pay via UPI (Online)</span>
          </label>

          <div id="cod-section" style="display: none; margin-top: 20px;">
            <button type="button" id="place-order-cod-btn" class="btn btn-primary">Place Order (COD)</button>
          </div>

          <div id="upi-section" style="display: none; margin-top: 20px; text-align: center;">
            <canvas id="upi-qr-canvas" style="margin: 0 auto; display: block;"></canvas>
            <a id="upi-pay-link" href="#" style="display: none; color: var(--color-primary); font-weight: bold; margin-top: 10px;">Click here to Pay via UPI App</a>
            <p id="upi-amount-text" style="font-weight: bold; font-size: 1.1rem; margin-top: 15px;"></p>
            <button type="button" id="upi-done-btn" class="btn btn-primary" style="margin-top: 15px;">I have paid, Place Order</button>
          </div>
        </section>

        <!-- Success Section -->
        <section id="confirmation-section" class="checkout-card" style="display: none; text-align: center; padding: 40px 20px;">
          <h2 style="color: green;">Order Placed Successfully! 🎉</h2>
          <p>Your Order ID is <strong id="confirmation-order-id" style="font-size: 1.2rem;"></strong></p>
          <p id="confirmation-payment-note" style="color: #555; margin-top: 10px;"></p>
          <a href="index.html" class="btn btn-primary" style="margin-top: 20px;">Continue Shopping</a>
        </section>

      </div>

      <!-- Right Column: Summary -->
      <aside class="checkout-card" style="position: sticky; top: 90px;" id="summary-aside">
        <h3 style="margin-top: 0;">Order Summary</h3>
        <div id="checkout-items-list" style="margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 15px; font-size: 0.9rem;"></div>
        
        <div class="summary-row">
          <span>Subtotal</span>
          <span id="summary-subtotal">₹0</span>
        </div>
        <div class="summary-row" id="summary-discount-row" style="display: none; color: green;">
          <span>Discount</span>
          <span id="summary-discount-amount">-₹0</span>
        </div>
        <div class="summary-row" id="summary-cod-row" style="display: none;">
          <span>COD Charge</span>
          <span id="summary-cod-amount">+₹0</span>
        </div>
        <div class="summary-row summary-row--total">
          <span>Total to Pay</span>
          <span id="summary-total" style="color: var(--color-primary);">₹0</span>
        </div>
      </aside>

    </div>
  </div>
</main>

<div id="footer-mount"></div>

<script src="js/site-config.js"></script>
<script src="js/security.js"></script>
<script src="js/layout.js"></script>
<script src="js/cart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1/build/qrcode.min.js"></script>
<script src="js/qr-generator.js"></script>
<script src="js/emailjs-integration.js"></script>
<script src="js/product-loader.js"></script>
<script src="js/checkout.js"></script>
<script>window.addEventListener("layout:ready", () => ProductLoader.initHeader());</script>
</body>
</html>
