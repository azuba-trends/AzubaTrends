<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/images/icons/favicon-32.png">
<link rel="apple-touch-icon" href="/images/icons/apple-touch-icon.png">
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#1F3A5F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="AzubaTrends" id="apple-app-title-meta">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page not found — AzubaTrends</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/main.css">
<link rel="stylesheet" href="/css/components.css">
</head>
<body>

<div id="header-mount"></div>

<main>
  <div class="notfound">
    <div class="notfound__code">404</div>
    <h1 id="notfound-heading">This page wandered off</h1>
    <p style="max-width:44ch; margin-top:8px;">
      The page you're looking for doesn't exist, or the link may be out of date.
    </p>
    <p style="margin-top:24px;"><a class="btn btn-primary" href="/">Back to shop</a></p>
  </div>
</main>

<div id="footer-mount"></div>

<script src="/js/site-config.js"></script>
<script src="/js/tracking.js"></script>
<script src="/js/security.js"></script>
<script src="/js/layout.js"></script>
    <script src="/js/cart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fuse.js@7/dist/fuse.min.js"></script>
<script src="/js/product-loader.js"></script>
<script src="/js/search.js"></script>
<script src="/js/page-loader.js"></script>
<script>
  window.addEventListener("layout:ready", () => ProductLoader.initHeader());
  document.addEventListener("DOMContentLoaded", () => {
    // Heading text only — title/meta stay hardcoded "noindex" on purpose,
    // that's correct SEO practice for an error page (Google should never
    // index /404, regardless of what the admin writes for its heading).
    PageLoader.getPageBySlug("404").then((page) => {
      if (page && page.heading) Security.setTextSafely(document.getElementById("notfound-heading"), page.heading);
    });
  });
</script>
</body>
</html>
